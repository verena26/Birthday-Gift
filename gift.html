<!DOCTYPE html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>A Gift For Sky</title>

        <style>

            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
            }

            body{
                background:#ffffff;
                font-family:Georgia, serif;
                overflow-x:hidden;
            }

            section{
                min-height:100vh;
                padding:80px 10%;
            }

            .title{
                text-align:center;
                margin-bottom:50px;
            }

            .title h1{
                font-size:3rem;
            }

            .title p{
                margin-top:10px;
            }

            .reveal{
                opacity:0;
                transform:translateY(50px);
                transition:1s;
            }

            .reveal.active{
                opacity:1;
                transform:translateY(0);
            }

            /* LETTERS */

            .letters{
                display:grid;
                grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
                gap:30px;
                max-width:1200px;
                margin:auto;
            }

            .letter-card{
                background:white;
                border-radius:20px;
                padding:20px;
                text-align:center;
                cursor:pointer;
                transition:0.3s;
                box-shadow:0 5px 20px rgba(0,0,0,0.15);
            }

            .letter-card:hover{
                transform:translateY(-10px);
            }

            .envelope{
                width:120px;
                margin-bottom:15px;
                transition:0.3s;
            }

            .letter-card:hover .envelope{
                transform:scale(1.1);
            }

            /* MEMORIES */

            .memories{
                display:flex;
                flex-direction:column;
            }

            .memories{
                display:grid;
                grid-template-columns:repeat(4, 1fr);
                gap:20px;
            }

            .memory img{
                width:100%;
                height:250px;
                object-fit:cover;
            }

            /* VIDEO */

            .video-container{
                display:flex;
                justify-content:center;
            }

            video{
                width:80%;
                max-width:800px;
                border-radius:20px;
            }

        </style>
    </head>

            <script>

            function toggleLetter(card){

                const content = card.querySelector(".letter-content");

                if(content.style.display === "block"){
                    content.style.display = "none";
                }else{
                    content.style.display = "block";
                }
            }

            const observer = new IntersectionObserver(entries => {

                entries.forEach(entry => {

                    if(entry.isIntersecting){
                        entry.target.classList.add("active");
                    }

                });

            });

            document.querySelectorAll(".reveal").forEach(el => {
                observer.observe(el);
            });
