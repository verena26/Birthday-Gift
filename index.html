<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Happy Birthday Sky</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <h1>A birthday cake appeared!</h1>

        <p>Make a wish and blow into your microphone.</p>

        <div class="cake">
            <div id="flame">🔥</div>
            <div class="cake-body">🎂</div>
        </div>

        <div id="gift" style="display:none;">
            <h2>✨ Wish granted! ✨</h2>
            <a href="gift.html">
             <button>🎁 Open Present</button>
            </a>
        </div>

        <script src="script.js"></script>

    </body>
    <style>
        body{
            margin:0;
            min-height:100vh;

            display:flex;
            flex-direction:column;

            justify-content:center;
            align-items:center;

            text-align:center;
            background:#f5c27c;
            font-family:Arial, sans-serif;
        }
        .cake{
            margin:20px 0;
            animation:float 2s ease-in-out infinite;
        }
            @keyframes float{
                0%,100%{
                    transform:translateY(0);
                }
                50%{
                    transform:translateY(-15px);
                }
            }

        #flame{
            font-size:60px;
            animation:flicker 0.3s infinite alternate;
        }

        .cake-body{
            font-size:120px;
        }

        @keyframes flicker{
            from{
                transform:rotate(-5deg);
            }
            to{
                transform:rotate(5deg);
            }
        }

        button{
            padding:15px 25px;
            font-size:18px;
            cursor:pointer;
        }
        
    </style>
    <script>
            async function startListening() {

            const stream = await navigator.mediaDevices.getUserMedia({
                audio: true
            });

            const audioContext = new AudioContext();
            const microphone = audioContext.createMediaStreamSource(stream);

            const analyser = audioContext.createAnalyser();

            microphone.connect(analyser);

            const data = new Uint8Array(analyser.frequencyBinCount);

            function checkVolume() {

                analyser.getByteFrequencyData(data);

                let volume = data.reduce((a, b) => a + b) / data.length;

                if (volume > 20) {

                    document.getElementById("flame").innerHTML = "💨";

                    setTimeout(() => {
                        document.getElementById("flame").style.display = "none";
                        document.getElementById("gift").style.display = "block";
                    }, 1000);

                    return;
                }

                requestAnimationFrame(checkVolume);
            }

            checkVolume();
        }

        startListening();
    </script>
</html>
